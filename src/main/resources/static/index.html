<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gmail Excel Exporter</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
<main class="page">
    <section class="export-panel">
        <div class="brand-row">
            <div class="gmail-icon" aria-hidden="true">
                <span class="gmail-left"></span>
                <span class="gmail-center"></span>
                <span class="gmail-right"></span>
            </div>
            <div>
                <h1>Gmail Excel Exporter</h1>
                <p>Select a duration and download Gmail messages as an Excel file.</p>
            </div>
        </div>

        <form id="exportForm" class="export-form">
            <label>
                Start date
                <input id="startDate" type="date" required>
            </label>

            <label>
                End date
                <input id="endDate" type="date" required>
            </label>

            <button id="exportButton" type="submit">
                <span class="button-icon" aria-hidden="true"></span>
                Get Gmail Excel
            </button>
        </form>

        <p id="statusMessage" class="status" role="status"></p>
    </section>
</main>

<script src="/app.js"></script>
</body>
</html>
