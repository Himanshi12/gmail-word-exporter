spring.application.name=gmail-word-exporter

#spring.datasource.url=jdbc:postgresql://localhost:5432/gmail_exporter
#spring.datasource.username=postgres
#spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
#spring.datasource.hikari.connection-timeout=5000

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}




spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

gmail.credentials-path=classpath:credentials.json
gmail.tokens-directory=tokens
gmail.application-name=Gmail Word Exporter

server.port=8080
server.forward-headers-strategy=framework

app.export-time-zone=Asia/Kolkata
